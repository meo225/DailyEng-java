name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── Backend (Spring Boot / Java 21) ───
  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        run: mvn compile -q -B

  # ─── Frontend (Next.js) ───
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Generate Prisma Schema & Push
        run: |
          npx prisma generate
          npx prisma db push
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"

      - name: Build
        run: npm run build
        env:
          # Dummy values so Next.js build doesn't fail on missing env vars
          DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
          AUTH_SECRET: "dummy-secret-for-ci"
          JWT_SECRET: "dummy-jwt-for-ci"
          NEXT_PUBLIC_API_URL: "http://localhost:8080/api"
