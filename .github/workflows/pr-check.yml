name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── Backend (Spring Boot / Java 21) ───
  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile
        # -P!ci disables the Sentry source-upload profile (requires SENTRY_AUTH_TOKEN).
        # Sentry SDK still works at runtime; only source maps are skipped here.
        run: mvn compile -q -B "-P!ci"

  # ─── Frontend (Next.js) ───
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: "dummy-secret-for-ci"
          JWT_SECRET: "dummy-jwt-for-ci"
          NEXT_PUBLIC_API_URL: "http://localhost:8080/api"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
