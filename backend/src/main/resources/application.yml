spring:
  application:
    name: dailyeng-api

  # ========================
  # Database (PostgreSQL)
  # ========================
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/dailyeng}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate  # Validate against existing schema, don't modify
    show-sql: false
    open-in-view: false   # Disable OSIV for performance
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC
        types:
          print:
            banner: false

  # ========================
  # Mail (for password reset)
  # ========================
  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM:DailyEng <security@dailyeng.me>}

  # ========================
  # Cache
  # ========================
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=86400s

  # ========================
  # Jackson
  # ========================
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # ========================
  # Virtual Threads (Java 21+)
  # ========================
  threads:
    virtual:
      enabled: true

# ========================
# Server
# ========================
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

# ========================
# JWT Configuration
# ========================
app:
  jwt:
    secret: ${JWT_SECRET:dailyeng-super-secret-key-change-in-production-must-be-at-least-256-bits-long}
    expiration-ms: 86400000   # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  # ========================
  # CORS
  # ========================
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  # ========================
  # External APIs
  # ========================
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash

  pexels:
    api-key: ${PEXELS_API_KEY:}

  # ========================
  # App URLs
  # ========================
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

# ========================
# Actuator
# ========================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# ========================
# Logging
# ========================
logging:
  level:
    com.dailyeng: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
