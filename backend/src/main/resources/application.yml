spring:
  application:
    name: dailyeng-api

  # ========================
  # Database logic managed by com.dailyeng.config.DatabaseConfig
  # Schema migrations managed by Flyway
  # ========================

  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      idle-timeout: 300000          # 5 min
      connection-timeout: 10000     # 10s
      max-lifetime: 1800000         # 30 min
      leak-detection-threshold: 60000  # 60s

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0        # Run all migrations from V1 on fresh databases
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none  # Flyway manages the schema
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
    show-sql: false
    open-in-view: false   # Disable OSIV for performance
    properties:
      hibernate:
        format_sql: true
        default_schema: public
        globally_quoted_identifiers: true
        jdbc:
          time_zone: UTC
        types:
          print:
            banner: false

  # ========================
  # Mail (for password reset)
  # ========================
  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM:DailyEng <security@dailyeng.me>}

  # ========================
  # Cache
  # ========================
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=86400s

  # ========================
  # Jackson
  # ========================
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # ========================
  # Virtual Threads (Java 21+)
  # ========================
  threads:
    virtual:
      enabled: true

# ========================
# Server
# ========================
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

# ========================
# JWT Configuration
# ========================
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000   # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

  # ========================
  # Cookie (httpOnly auth)
  # ========================
  cookie:
    secure: ${COOKIE_SECURE:false}  # Set to true in production (HTTPS)
    same-site: Lax
    domain: ${COOKIE_DOMAIN:}
    access-max-age: 86400     # 24 hours
    refresh-max-age: 604800   # 7 days

  # ========================
  # CORS
  # ========================
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  # ========================
  # External APIs
  # ========================
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-3.1-flash-lite-preview}
    temperature: 0.7
    max-tokens: 4096

  azure-speech:
    subscription-key: ${AZURE_SPEECH_KEY:}
    region: ${AZURE_SPEECH_REGION:japaneast}
    stt-language: en-US
    tts-voice: en-US-JennyNeural

  pexels:
    api-key: ${PEXELS_API_KEY:}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}

  # ========================
  # App URLs
  # ========================
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

# ========================
# Resilience4j
# ========================
resilience4j:
  circuitbreaker:
    instances:
      azureSpeech:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 5
      gemini:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 5
  retry:
    instances:
      azureSpeech:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.http.HttpTimeoutException
          - java.util.concurrent.TimeoutException
      gemini:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.net.http.HttpTimeoutException
          - com.google.genai.errors.ServerException
          - com.google.genai.errors.GenAiIOException

# ========================
# Actuator
# ========================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,retries
  endpoint:
    health:
      show-details: when_authorized

# ========================
# Logging
# ========================
logging:
  level:
    com.dailyeng: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# ========================
# Sentry
# ========================
sentry:
  dsn: https://cf2665ef787b1b0b47cfdac06c92e520@o4510039124475904.ingest.us.sentry.io/4511083289706496
  send-default-pii: true
  traces-sample-rate: 0.1           # 10% of requests traced in production
  environment: ${SENTRY_ENVIRONMENT:development}
  exception-resolver-order: -2147483647  # Ensures Sentry captures before Spring's default handler
  enable-tracing: true
